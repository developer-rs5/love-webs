<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Calculator 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="card">
    <h2>💖 Love Calculator 💖</h2>

    <input id="name1" placeholder="Your Name">
    <input id="name2" placeholder="Partner Name">

    <button onclick="calculate()">Calculate ❤️</button>

    <div class="result" id="result"></div>
</div>

<script>

// Normalize
function normalize(name) {
    return name.toLowerCase().trim();
}

// Kashu names
function isKashu(name) {
    return [
        "kashvi",
        "kashu",
        "kashvi singh",
        "kashu singh"
    ].includes(name);
}

// Rishabh names
function isRishabh(name) {
    return [
        "rishabh",
        "rishabh sharma"
    ].includes(name);
}

// 🔒 Stable hash (same input = same output)
function getStablePercent(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    return Math.abs(hash);
}

function calculate() {
    let n1 = normalize(document.getElementById("name1").value);
    let n2 = normalize(document.getElementById("name2").value);

    let resultBox = document.getElementById("result");

    let combo = n1 + "|" + n2;

    // 💯 ONLY YOU TWO
    if (
        (isKashu(n1) && isRishabh(n2)) ||
        (isKashu(n2) && isRishabh(n1))
    ) {
        resultBox.innerHTML = `
            💯 100% Love Match 💖<br><br>
            He is only yours ❤️<br>
            He loves you so much Kashvi 💞
        `;
        return;
    }

    // 💀 Kashu + ANYONE ELSE
    if (isKashu(n1) || isKashu(n2)) {
        let base = getStablePercent(combo);
        let percent = (base % 16); // 0–15 fixed

        resultBox.innerHTML = `
            💔 ${percent}% Match<br>
            Not meant to be 🚫
        `;
        return;
    }

    // 😏 Others (stable but normal range)
    let base = getStablePercent(combo);
    let percent = (base % 101);

    resultBox.innerHTML = `
        💘 ${percent}% Match<br>
        ${percent > 70 ? "Strong connection 🔥" : "Needs work 😏"}
    `;
}

</script>

</body>
</html>
